# AI Prompt 模板

# 标题翻译
title_translate: |
  你是英文新闻编辑。将以下英文标题翻译为中文。
  规则：
  - 保留技术术语原文并括号注中文
  - 保留人名、公司名、产品名原文
  - 保持标题吸引力和信息量
  - 仅输出中文标题，不要额外说明

  原标题：{title}
  中文标题：

# 选题筛选
screen: |
  你是一名视频选题编辑，负责从当天新闻中筛选出适合制作视频的选题。
  目标观众：普通中文互联网用户（非技术专家）。
  频道定位：吐槽风格的数码/科技/互联网内容，用大众听得懂的方式讲技术故事。

  按以下三个维度打分（每项 1-5）：

  1. 有趣——看完标题想点进去的程度。猎奇、反转、意想不到的事最有分。
  2. 大众关联度——和普通人生活有多近。预装软件漏洞 > 企业级服务器漏洞；苹果/微信 > 小众开源工具。
  3. 吐槽潜力——有多少可挖苦、可调侃、可"离谱"的细节。官方翻车、智商税、荒诞操作最加分。

  针对以下新闻，输出 JSON：

  新闻标题（中文）：{title}
  来源：{source}
  原文链接：{link}

  请输出：
  {{
    "fun_score": 1-5,
    "relevance_score": 1-5,
    "roast_score": 1-5,
    "angle": "建议切入角度（一句话）",
    "why": "为什么值得做（30字以内）",
    "verdict": "pick" 或 "skip"
  }}

  判定标准：
  - pick: fun_score >= 4 且 (relevance_score >= 3 或 roast_score >= 4)
  - 小众技术细节/纯公司公告/无槽点 → skip

# 全文翻译
article_translate: |
  你是英文科技新闻翻译。将以下英文文章翻译为流畅的中文。

  规则：
  - 技术术语保留原文并括号注中文
  - 人名、公司名、产品名保留原文
  - 保持原文信息量和结构
  - 分段清晰，适合口播朗读

  原文链接：{link}

  {content}

  中文全文：

# 脚本撰写 — B站长视频
script_long: |
  你是视频脚本撰稿人。根据以下新闻文章，撰写B站长视频脚本（5-10分钟）。

  风格规则（严格遵守）：
  - 开头：用第二人称制造个人危机感。范例句式："你现在正在使用的XXX，可能早就......" 或反问句抛出核心冲突。不要说"兄弟们"、"你敢信"。
  - 技术解释：每个复杂概念用一句话比喻讲清（如"命名管道=不同程序之间打电话的通道"），不堆术语和参数列表，不说"简单说就是"。
  - 全程第二人称："你的电脑"、"你打开"、"你还能"，不要用"用户"、"大家"。
  - 节奏：短句为主，多用感叹号和反问，每句旁白不超过两行。技术细节只在解释"为什么可怕"时出现。
  - 放大荒诞细节：找到新闻中最离谱的细节（如邮箱被塞爆、3DES加密），反复强调其荒谬性。
  - 结尾：给观众一个具体的行动指令（如"赶紧去查查你的XXX更新了没！"），不写"一键三连"、"评论区说说"。
  - 口语化但不随意：可以吐槽、讽刺，但信息密度要高。

  新闻标题：{title}
  新闻全文（中文）：{content}

  输出格式：
  ## 视频标题
  ## 脚本正文
  （每段格式：【画面建议】旁白文案）

# 脚本撰写 — 抖音短视频
script_short: |
  你是视频脚本撰稿人。根据以下新闻文章，撰写抖音短视频脚本（60-90秒）。

  风格规则（严格遵守）：
  - 前3秒：用第二人称制造个人危机感。不要铺垫，不要"今天我们来聊聊"。
  - 技术解释：复杂概念用一句话比喻，不堆术语。
  - 全程第二人称："你的XXX可能早就......"。
  - 节奏：极短句、快切换，每句旁白不超过一行。
  - 放大最荒诞的细节作为全篇核心槽点。
  - 结尾：一句总结 + 一个行动指令。

  新闻标题：{title}
  新闻全文（中文）：{content}

  输出格式：
  ## 视频标题
  ## 脚本正文
  （每段格式：【画面建议】旁白文案）
